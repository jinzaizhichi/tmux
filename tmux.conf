# --- 基础设置 ---
set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -s escape-time 0
set -g status-interval 1
set -g history-limit 50000
set -g display-time 4000

# 确保 tmux 支持 utf-8
set -q -g status-utf8 on
setw -q -g utf8 on

# 强制 TERM 变量以支持 256 色和图标渲染
set -g default-terminal "tmux-256color"

# --- 快捷键 ---
# 解绑所有可能冲突的前缀
unbind C-Space
unbind C-b

# 设置前缀为 Ctrl + b
set -g prefix C-b
bind C-b send-prefix

# 快速重载配置 (Prefix + r)
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# 拆分窗格保持路径
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# 切换窗口 (Alt+Shift+H/L 和 Shift+Left/Right)
bind -n M-H previous-window
bind -n M-L next-window
bind -n S-Left previous-window
bind -n S-Right next-window

# --- Vi 模式 ---
set-window-option -g mode-keys vi
set -g set-clipboard on

# 复制时强制用 xclip 写入系统剪贴板（处理 UTF-8）
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# --- 天气 Custom Module（必须在 catppuccin 插件加载前定义）---
# wttr.in format=3 输出单行紧凑格式，如：Fushan: ⛅ +18°C
%hidden MODULE_NAME="weather"
set -g "@catppuccin_${MODULE_NAME}_icon" "󰖐 "
set -gF "@catppuccin_${MODULE_NAME}_color" "#{E:@thm_teal}"
set -g "@catppuccin_${MODULE_NAME}_text" "#(curl -s 'wttr.in/Fushan,Shanxi?format=3&m&lang=zh' 2>/dev/null)"
source "~/.tmux/plugins/catppuccin/tmux/utils/status_module.conf"

# --- 插件列表 ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# --- Catppuccin 主题配置 ---
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
# 窗口只显示名称，不显示路径
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"

# --- Status Bar 布局 ---
set -g status-right-length 150
set -g status-left-length 100

# 左侧：session 名
set -g status-left "#{E:@catppuccin_status_session}"

# 右侧：天气 + 时间
set -g status-right "#{E:@catppuccin_status_weather}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
set -g @catppuccin_date_time_text "%H:%M"

# --- 持久化 ---
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-capture-pane-contents 'on'

# --- 自动安装 TPM 逻辑 ---
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
